<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub GELP - Noticias del Lobo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f0f2f5;
            --bg-nav: #002d5a; /* Azul GELP */
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #555555;
            --accent: #002d5a;
            --border: #dcdde1;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-nav: #0a0a0a;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #aaaaaa;
            --accent: #4a90e2;
            --border: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); transition: 0.3s; }

        header { background-color: var(--bg-nav); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        
        .header-btns { display: flex; gap: 10px; }
        button { cursor: pointer; border: none; border-radius: 5px; padding: 8px 15px; transition: 0.2s; }
        .btn-refresh { background: #27ae60; color: white; }
        .btn-theme { background: rgba(255,255,255,0.2); color: white; }

        .container { display: flex; max-width: 1300px; margin: 20px auto; gap: 20px; padding: 0 15px; }
        
        /* Sidebar Index */
        .sidebar { width: 220px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); height: fit-content; overflow: hidden; }
        .sidebar-item { padding: 15px; cursor: pointer; border-bottom: 1px solid var(--border); font-weight: 600; }
        .sidebar-item:hover, .sidebar-item.active { background: var(--accent); color: white; }

        .main-content { flex: 1; min-width: 0; }

        /* News Sections */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab { background: var(--bg-card); border: 1px solid var(--border); padding: 8px 20px; border-radius: 20px; font-size: 14px; white-space: nowrap; cursor: pointer; }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Tools Bar */
        .tools { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tools input, .tools select { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-main); min-width: 200px; }

        /* News Cards */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .card-meta { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .card-title { font-size: 1.1rem; font-weight: bold; line-height: 1.3; }
        .card-summary { font-size: 14px; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .card-link { margin-top: auto; text-decoration: none; background: var(--accent); color: white; text-align: center; padding: 10px; border-radius: 5px; font-size: 14px; font-weight: bold; }

        /* Live Score Banner */
        .live-banner { background: #c0392b; color: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; display: none; justify-content: space-between; align-items: center; }
        .live-banner.active { display: flex; }

        /* Tables */
        .table-container { background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg-nav); color: white; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr.highlight { background: rgba(0, 45, 90, 0.1); font-weight: bold; }

        @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="logo"><i class="fa-solid fa-shield-halved"></i> GELP HOY</div>
        <div class="header-btns">
            <button class="btn-theme" onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
            <button class="btn-refresh" onclick="refreshAll()"><i class="fa-solid fa-sync"></i> Actualizar</button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-item active" onclick="showSection('noticias', this)">Noticias</div>
            <div class="sidebar-item" onclick="showSection('posiciones', this)">Posiciones</div>
        </aside>

        <main class="main-content">
            <div id="section-noticias" class="content-section">
                <div class="tabs" id="sportTabs">
                    <div class="tab active" onclick="setSport('Todo', this)">Todo</div>
                    <div class="tab" onclick="setSport('Fútbol', this)">Fútbol</div>
                    <div class="tab" onclick="setSport('Básquet', this)">Básquet</div>
                    <div class="tab" onclick="setSport('Vóley', this)">Vóley</div>
                </div>

                <div class="live-banner" id="liveBanner">
                    <div>
                        <div id="liveLeague" style="font-size: 11px; font-weight: bold; opacity: 0.8;"></div>
                        <div id="liveMatch" style="font-size: 18px; font-weight: bold;"></div>
                    </div>
                    <div id="liveScore" style="font-size: 24px; font-weight: bold;"></div>
                </div>

                <div class="tools">
                    <input type="text" id="searchBar" placeholder="Buscar noticia..." oninput="filterNews()">
                    <select id="portalFilter" onchange="filterNews()">
                        <option value="all">Todos los portales</option>
                    </select>
                </div>

                <div class="news-grid" id="newsGrid">
                    </div>
            </div>

            <div id="section-posiciones" class="content-section" style="display: none;">
                <div class="tools">
                    <select id="tournamentSelect" onchange="fetchStandings()">
                        <option value="128">Liga Profesional Argentina</option>
                    </select>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>#</th><th>Equipo</th><th>Pts</th><th>PJ</th><th>V</th><th>E</th><th>D</th></tr>
                        </thead>
                        <tbody id="standingsTable"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const NEWS_API_KEY = '034d49f86772190e8bd3efe1c0a5e29e';
        const FOOTBALL_API_KEY = 'd07a089a76b2c5a4c9f66f80337665ea';
        const GELP_ID = 455;

        let rawNews = [];
        let currentSport = 'Todo';

        // Inicialización
        window.onload = refreshAll;

        function refreshAll() {
            fetchNews();
            fetchLiveMatch();
            fetchStandings();
        }

        // --- LÓGICA DE NOTICIAS ---
        async function fetchNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = "<p>Actualizando noticias...</p>";
            
            // Query más amplia para traer más resultados, luego filtramos nosotros
            const query = encodeURIComponent('Gimnasia La Plata');
            const url = `https://gnews.io/api/v4/search?q=${query}&lang=es&country=ar&max=50&apikey=${NEWS_API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // FILTRO ESTRICTO: Solo hoy (Hora Local)
                const localToday = new Date().toLocaleDateString('en-CA'); // Formato YYYY-MM-DD
                
                rawNews = (data.articles || []).filter(art => {
                    const artDate = art.publishedAt.split('T')[0];
                    return artDate === localToday;
                });

                // Ordenar: Más reciente primero
                rawNews.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

                updatePortalList();
                filterNews();
            } catch (e) {
                grid.innerHTML = "<p>Error al conectar con el servidor de noticias.</p>";
            }
        }

        function filterNews() {
            const searchText = document.getElementById('searchBar').value.toLowerCase();
            const selectedPortal = document.getElementById('portalFilter').value;
            const grid = document.getElementById('newsGrid');

            // Definición de palabras clave por deporte para el filtrado de pestañas
            const sportKeywords = {
                'Fútbol': ['fútbol', 'futbol', 'gol', 'lpf', 'copa', 'estancia chica', 'mendez'],
                'Básquet': ['básquet', 'basquet', 'nacional', 'triple', 'tablero'],
                'Vóley': ['vóley', 'voley', 'lobas', 'remate', 'set']
            };

            const filtered = rawNews.filter(art => {
                const text = (art.title + art.description).toLowerCase();
                
                const matchesSport = currentSport === 'Todo' || 
                                    sportKeywords[currentSport].some(key => text.includes(key));
                
                const matchesSearch = text.includes(searchText);
                const matchesPortal = selectedPortal === 'all' || art.source.name === selectedPortal;
                
                return matchesSport && matchesSearch && matchesPortal;
            });

            grid.innerHTML = filtered.length ? "" : "<p>No hay noticias de este deporte publicadas hoy.</p>";

            filtered.forEach(art => {
                const time = new Date(art.publishedAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-meta">
                            <span>${art.source.name}</span>
                            <span>${time}</span>
                        </div>
                        <div class="card-title">${art.title}</div>
                        <div class="card-summary">${art.description}</div>
                        <a href="${art.url}" target="_blank" class="card-link">Ver Noticia Completa</a>
                    </div>
                `;
            });
        }

        // --- LÓGICA DE FUTBOL (EN VIVO Y POSICIONES) ---
        async function fetchLiveMatch() {
            const banner = document.getElementById('liveBanner');
            try {
                const res = await fetch(`https://v3.football.api-sports.io/fixtures?team=${GELP_ID}&live=all`, {
                    headers: { 'x-apisports-key': FOOTBALL_API_KEY }
                });
                const data = await res.json();
                
                if(data.response && data.response.length > 0) {
                    const m = data.response[0];
                    document.getElementById('liveLeague').innerText = m.league.name;
                    document.getElementById('liveMatch').innerText = `${m.teams.home.name} vs ${m.teams.away.name}`;
                    document.getElementById('liveScore').innerText = `${m.goals.home} - ${m.goals.away}`;
                    banner.classList.add('active');
                } else {
                    banner.classList.remove('active');
                }
            } catch(e) { banner.classList.remove('active'); }
        }

        async function fetchStandings() {
            const table = document.getElementById('standingsTable');
            const leagueId = document.getElementById('tournamentSelect').value;
            const currentYear = new Date().getFullYear();

            try {
                const res = await fetch(`https://v3.football.api-sports.io/standings?league=${leagueId}&season=${currentYear}`, {
                    headers: { 'x-apisports-key': FOOTBALL_API_KEY }
                });
                const data = await res.json();
                const standings = data.response[0].league.standings[0];
                
                table.innerHTML = "";
                standings.forEach(t => {
                    const rowClass = t.team.id === GELP_ID ? 'class="highlight"' : '';
                    table.innerHTML += `
                        <tr ${rowClass}>
                            <td>${t.rank}</td>
                            <td>${t.team.name}</td>
                            <td>${t.points}</td>
                            <td>${t.all.played}</td>
                            <td>${t.all.win}</td>
                            <td>${t.all.draw}</td>
                            <td>${t.all.lose}</td>
                        </tr>
                    `;
                });
            } catch(e) { table.innerHTML = "<tr><td colspan='7'>No se pudo cargar la tabla real.</td></tr>"; }
        }

        // --- UTILIDADES DE UI ---
        function setSport(sport, el) {
            currentSport = sport;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            filterNews();
        }

        function showSection(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById('section-' + id).style.display = 'block';
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function updatePortalList() {
            const select = document.getElementById('portalFilter');
            const portals = [...new Set(rawNews.map(n => n.source.name))];
            select.innerHTML = '<option value="all">Todos los portales</option>';
            portals.forEach(p => select.innerHTML += `<option value="${p}">${p}</option>`);
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeBtn').innerHTML = isDark ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
        }
    </script>
</body>
</html>
