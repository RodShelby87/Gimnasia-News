<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Soccer News</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --card: #f4f4f4;
      --btn: #222;
      --btnText: #fff;
    }

    body.dark {
      --bg: #0f0f0f;
      --text: #ffffff;
      --card: #1c1c1c;
      --btn: #ffffff;
      --btnText: #000;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    header {
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      background: var(--btn);
      color: var(--btnText);
      border-radius: 5px;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: var(--card);
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    a {
      color: inherit;
      text-decoration: none;
      font-weight: bold;
    }

    small {
      display: block;
      margin-top: 5px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <h2>⚽ Soccer News</h2>
  <button onclick="toggleTheme()">🌙 / ☀️</button>
</header>

<div class="container" id="news">Loading...</div>

<script>
let newsData = [];

// LOAD NEWS (ONLY SOCCER)
async function loadNews() {
  try {
    const res = await fetch("/api/news");
    const data = await res.json();

    // FILTER ONLY SOCCER
    newsData = data.filter(n => n.sport === "futbol");

    renderNews();
  } catch (err) {
    console.error(err);
    document.getElementById("news").innerHTML = "Error loading news";
  }
}

// RENDER
function renderNews() {
  const container = document.getElementById("news");

  if (!newsData.length) {
    container.innerHTML = "No soccer news found";
    return;
  }

  container.innerHTML = newsData.map(n => `
    <div class="card">
      <a href="${n.link}" target="_blank">${n.title}</a>
      <small>${n.dateOnly || ""}</small>
    </div>
  `).join("");
}

// DARK / LIGHT MODE
function toggleTheme() {
  document.body.classList.toggle("dark");
}

// INIT
loadNews();
</script>

</body>
</html>
