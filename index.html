<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gimnasia News</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --card: #f4f4f4;
      --accent: #0b5ed7; /* default team color */
    }

    body.dark {
      --bg: #0f0f10;
      --text: #f5f5f5;
      --card: #1c1c1e;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s ease;
    }

    header {
      padding: 16px;
      background: var(--accent);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input {
      padding: 6px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .container {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .card {
      background: var(--card);
      padding: 12px;
      border-radius: 10px;
      border-left: 4px solid var(--accent);
    }

    .card a {
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
    }

    .meta {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<header>
  <h1>Gimnasia News</h1>
  <div class="controls">
    <input id="search" placeholder="Search news..." oninput="filterNews()" />
    <button onclick="toggleTheme()">Toggle mode</button>
  </div>
</header>

<div class="container" id="news"></div>

<script>
const TEAM_COLOR = "#00a6ff"; // adjust to club color
let allNews = [];

async function fetchNews() {
  try {
    const res = await fetch("/api/news");
    const data = await res.json();
    allNews = data;
    renderNews(allNews);
  } catch (e) {
    document.getElementById("news").innerHTML = "Error loading news.";
  }
}

function renderNews(news) {
  const container = document.getElementById("news");
  container.innerHTML = "";

  news.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <a href="${item.link}" target="_blank">${item.title}</a>
      <div class="meta">${item.dateOnly || item.time || ""}</div>
    `;

    container.appendChild(div);
  });
}

function filterNews() {
  const value = document.getElementById("search").value.toLowerCase();
  const filtered = allNews.filter(n =>
    n.title.toLowerCase().includes(value)
  );
  renderNews(filtered);
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}

// apply team color dynamically
document.documentElement.style.setProperty("--accent", TEAM_COLOR);

fetchNews();
</script>

</body>
</html>
