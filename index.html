<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sports Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 5px; }
    .tab { margin-top: 20px; }
  </style>
</head>

<body>

<h1>Sports Dashboard</h1>

<!-- TABS -->
<button onclick="showTab('news')">News</button>
<button onclick="showTab('standings')">Standings</button>

<hr />

<!-- SPORT FILTER -->
<div id="sportTabs"></div>

<hr />

<!-- NEWS -->
<div id="newsTab" class="tab">
  <h2>News</h2>
  <div id="news"></div>
</div>

<!-- STANDINGS -->
<div id="standingsTab" class="tab" style="display:none">
  <h2>Standings</h2>

  <select id="tournament" onchange="loadStandings()">
    <option value="all">All tournaments</option>
    <option value="liga">Liga</option>
    <option value="cup">Cup</option>
  </select>

  <div id="standings"></div>
</div>

<script>
let allNews = [];
let currentSport = "all";
let currentTab = "news";

// DOM
const newsEl = document.getElementById("news");
const sportTabsEl = document.getElementById("sportTabs");
const standingsEl = document.getElementById("standings");

// ------------------- LOAD NEWS -------------------
async function loadNews() {
  try {
    const res = await fetch("/api/news");
    allNews = await res.json();

    renderSports();
    renderNews();
  } catch (err) {
    console.error("News error:", err);
    newsEl.innerHTML = "Failed to load news";
  }
}

// ------------------- SPORTS TABS -------------------
function renderSports() {
  const sports = ["all", ...new Set(allNews.map(n => n.sport))];

  sportTabsEl.innerHTML = "";

  sports.forEach(s => {
    const btn = document.createElement("button");
    btn.textContent = s;

    btn.onclick = () => {
      currentSport = s;
      renderNews();
    };

    sportTabsEl.appendChild(btn);
  });
}

// ------------------- NEWS -------------------
function renderNews() {
  const filtered =
    currentSport === "all"
      ? allNews
      : allNews.filter(n => n.sport === currentSport);

  if (!filtered.length) {
    newsEl.innerHTML = "No news found";
    return;
  }

  newsEl.innerHTML = filtered.map(n => `
    <div style="margin-bottom:10px">
      <a href="${n.link}" target="_blank">${n.title}</a><br/>
      <small>${n.dateOnly || ""}</small>
    </div>
  `).join("");
}

// ------------------- STANDINGS -------------------
async function loadStandings() {
  try {
    const tournament = document.getElementById("tournament").value;

    const res = await fetch(`/api/standings?sport=${currentSport}&tournament=${tournament}`);
    const data = await res.json();

    if (!data.length) {
      standingsEl.innerHTML = "No standings data";
      return;
    }

    standingsEl.innerHTML = `
      <table border="1" cellpadding="6">
        <tr>
          <th>Team</th>
          <th>Points</th>
          <th>Played</th>
        </tr>
        ${data.map(t => `
          <tr>
            <td>${t.name}</td>
            <td>${t.points}</td>
            <td>${t.played}</td>
          </tr>
        `).join("")}
      </table>
    `;
  } catch (err) {
    console.error("Standings error:", err);
    standingsEl.innerHTML = "Failed to load standings";
  }
}

// ------------------- TABS -------------------
function showTab(tab) {
  currentTab = tab;

  document.getElementById("newsTab").style.display = tab === "news" ? "block" : "none";
  document.getElementById("standingsTab").style.display = tab === "standings" ? "block" : "none";

  if (tab === "standings") {
    loadStandings();
  }
}

// INIT
loadNews();
</script>

</body>
</html>
