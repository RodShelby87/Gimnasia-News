<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GELP Hub Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa; --card: #ffffff; --text: #212529; --nav: #002d5a; --accent: #002d5a; --border: #dee2e6;
        }
        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --text: #e9ecef; --nav: #000000; --accent: #4dabf7; --border: #343a40;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; line-height: 1.6; }

        header { background: var(--nav); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo { font-size: 1.25rem; font-weight: 800; text-transform: uppercase; }
        .controls button { background: rgba(255,255,255,0.1); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; margin-left: 8px; }

        .container { display: grid; grid-template-columns: 240px 1fr; max-width: 1300px; margin: 2rem auto; gap: 2rem; padding: 0 1rem; }
        
        .sidebar { background: var(--card); border-radius: 12px; border: 1px solid var(--border); height: fit-content; overflow: hidden; }
        .nav-link { padding: 1rem; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; border-bottom: 1px solid var(--border); }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }

        .tabs { display: flex; gap: 10px; margin-bottom: 1.5rem; overflow-x: auto; }
        .tab { background: var(--card); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem; }
        .tab.active { background: var(--accent); color: white; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); }
        .source-tag { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 0.5rem; }
        .title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
        .desc { font-size: 0.9rem; opacity: 0.8; margin-bottom: 1.5rem; }
        .btn-link { margin-top: auto; background: var(--accent); color: white; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 0.9rem; font-weight: bold; }

        .table-wrap { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.05); padding: 12px; text-align: left; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr.gelp { background: rgba(0, 45, 90, 0.15); font-weight: bold; }

        .filter-bar { margin-bottom: 1.5rem; }
        select { width: 100%; padding: 10px; border-radius: 8px; background: var(--card); color: var(--text); border: 1px solid var(--border); }

        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="logo">GELP Hub</div>
        <div class="controls">
            <button onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
            <button onclick="refreshData()"><i class="fa-solid fa-rotate"></i></button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="nav-link active" id="nav-news" onclick="view('news')"><i class="fa-solid fa-newspaper"></i> Noticias</div>
            <div class="nav-link" id="nav-stats" onclick="view('stats')"><i class="fa-solid fa-table-list"></i> Posiciones</div>
        </aside>

        <main>
            <section id="view-news">
                <div class="tabs">
                    <div class="tab active" onclick="setCat('Todo', this)">Todo</div>
                    <div class="tab" onclick="setCat('Fútbol', this)">Fútbol</div>
                    <div class="tab" onclick="setCat('Básquet', this)">Básquet</div>
                    <div class="tab" onclick="setCat('Vóley', this)">Vóley</div>
                </div>
                <div class="news-grid" id="newsGrid">Cargando noticias...</div>
            </section>

            <section id="view-stats" style="display:none">
                <div class="filter-bar">
                    <select id="leagueSelect" onchange="loadTable()">
                        <option value="128">Liga Profesional Argentina</option>
                        <option value="130">Copa de la Liga (AFA)</option>
                        <option value="13">Copa Libertadores</option>
                        <option value="11">Copa Sudamericana</option>
                    </select>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>#</th><th>Equipo</th><th>Pts</th><th>PJ</th><th>DG</th></tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        const NEWS_API = '034d49f86772190e8bd3efe1c0a5e29e';
        const FB_API = 'd07a089a76b2c5a4c9f66f80337665ea';
        const GELP_ID = 455;
        
        let articles = [];
        let cat = 'Todo';

        // --- TEMA ---
        function toggleTheme() {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('gelp_theme', newTheme);
            document.getElementById('themeBtn').innerHTML = newTheme === 'light' ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
        }

        window.onload = () => {
            const saved = localStorage.getItem('gelp_theme') || 'light';
            document.body.setAttribute('data-theme', saved);
            document.getElementById('themeBtn').innerHTML = saved === 'light' ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
            refreshData();
        };

        // --- NAVEGACIÓN ---
        function view(id) {
            document.getElementById('view-news').style.display = id === 'news' ? 'block' : 'none';
            document.getElementById('view-stats').style.display = id === 'stats' ? 'block' : 'none';
            document.getElementById('nav-news').classList.toggle('active', id === 'news');
            document.getElementById('nav-stats').classList.toggle('active', id === 'stats');
            if(id === 'stats') loadTable();
        }

        function setCat(c, el) {
            cat = c;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        // --- DATOS ---
        async function fetchNews() {
            const grid = document.getElementById('newsGrid');
            try {
                // Buscamos Gimnasia LP. Nota: GNews a veces filtra mucho por fecha, ampliamos la búsqueda.
                const res = await fetch(`https://gnews.io/api/v4/search?q="Gimnasia y Esgrima La Plata"&lang=es&country=ar&max=20&apikey=${NEWS_API}`);
                const data = await res.json();
                articles = data.articles || [];
                render();
            } catch (e) { grid.innerHTML = "Error al cargar noticias."; }
        }

        function render() {
            const grid = document.getElementById('newsGrid');
            const keys = { 
                'Fútbol': ['futbol', 'gol', 'mendez', 'lpf', 'estancia'], 
                'Básquet': ['basquet', 'nacional', 'triple', 'lobo'],
                'Vóley': ['voley', 'lobas', 'set']
            };
            
            const filtered = articles.filter(a => {
                const text = (a.title + a.description).toLowerCase();
                return cat === 'Todo' || keys[cat].some(k => text.includes(k));
            });

            if(!filtered.length) { grid.innerHTML = "No hay noticias recientes."; return; }

            grid.innerHTML = filtered.map(a => `
                <div class="card">
                    <span class="source-tag">${a.source.name}</span>
                    <div class="title">${a.title}</div>
                    <div class="desc">${a.description.substring(0, 120)}...</div>
                    <a href="${a.url}" target="_blank" class="btn-link">Leer más</a>
                </div>
            `).join('');
        }

        async function loadTable() {
            const body = document.getElementById('tableBody');
            const league = document.getElementById('leagueSelect').value;
            body.innerHTML = "Cargando tabla...";
            try {
                const res = await fetch(`https://v3.football.api-sports.io/standings?league=${league}&season=2024`, {
                    headers: { 'x-apisports-key': FB_API }
                });
                const data = await res.json();
                const list = data.response[0].league.standings[0];
                body.innerHTML = list.map(t => `
                    <tr class="${t.team.id === GELP_ID ? 'gelp' : ''}">
                        <td>${t.rank}</td>
                        <td>${t.team.name}</td>
                        <td>${t.points}</td>
                        <td>${t.all.played}</td>
                        <td>${t.goalsDiff}</td>
                    </tr>
                `).join('');
            } catch (e) { body.innerHTML = "Tabla no disponible para este torneo."; }
        }

        function refreshData() {
            fetchNews();
            if(document.getElementById('view-stats').style.display === 'block') loadTable();
        }
    </script>
</body>
</html>
