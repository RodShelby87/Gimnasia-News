<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GELP News</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #002d5a;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-left: 5px solid #002d5a;
    border-radius: 8px;
}

.title {
    font-weight: bold;
    margin-bottom: 8px;
}

.time {
    font-size: 12px;
    color: gray;
}

a {
    text-decoration: none;
    color: #002d5a;
    font-weight: bold;
}
</style>
</head>

<body>

<header>Gimnasia y Esgrima La Plata - Noticias</header>

<div class="container" id="news">
    Cargando noticias...
</div>

<script>
async function loadNews() {
    const res = await fetch("/api/news");
    const data = await res.json();

    const container = document.getElementById("news");

    if (!data.length) {
        container.innerHTML = "<p>No hay noticias hoy.</p>";
        return;
    }

    container.innerHTML = data.map(n => `
        <div class="card">
            <div class="title">${n.title}</div>
            <div class="time">${n.time}</div>
            <a href="${n.link}" target="_blank">Leer noticia</a>
        </div>
    `).join("");
}

loadNews();
</script>

</body>
</html>
