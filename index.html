<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GELP Hub</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: #f4f6f9;
    color: #111;
}

.dark {
    background:#0f172a;
    color:#fff;
}

header {
    background:#002d5a;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button {
    margin-left:8px;
    padding:8px;
    cursor:pointer;
}

.container {
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card {
    background:white;
    padding:15px;
    margin:10px 0;
    border-left:5px solid #002d5a;
    border-radius:8px;
}

.dark .card {
    background:#1e293b;
}

.title { font-weight:bold; }
.small { font-size:12px; opacity:0.7; }

.topbar {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

input, select {
    padding:8px;
}
.tabs {
    display:flex;
    gap:10px;
    margin:10px 0;
}
.tab {
    padding:8px 12px;
    background:#ddd;
    cursor:pointer;
    border-radius:20px;
}
.tab.active {
    background:#002d5a;
    color:white;
}

.dark .tab {
    background:#334155;
}
</style>
</head>

<body>

<header>
<div>GELP HUB</div>
<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="loadNews()">🔄</button>
</div>
</header>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="setTab('news')">Noticias</div>
<div class="tab" onclick="setTab('table')">Posiciones</div>
</div>

<div class="topbar">
<input id="search" placeholder="Buscar..." oninput="renderNews()">
<select id="sourceFilter" onchange="renderNews()">
<option value="">Todos los portales</option>
</select>
</div>

<div id="news"></div>

<div id="table" style="display:none">
<h3>Tabla</h3>
<div id="standings"></div>
</div>

</div>

<script>
let allNews = [];
let dark = false;

function toggleDark(){
    dark = !dark;
    document.body.classList.toggle("dark", dark);
    localStorage.setItem("dark", dark);
}

function setTab(tab){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    event.target.classList.add("active");

    document.getElementById("news").style.display = tab==="news"?"block":"none";
    document.getElementById("table").style.display = tab==="table"?"block":"none";

    if(tab==="table") loadTable();
}

async function loadNews(){
    const res = await fetch("/api/news");
    allNews = await res.json();

    // fill sources
    const sources = [...new Set(allNews.map(n=>n.source).filter(Boolean))];
    const sel = document.getElementById("sourceFilter");
    sel.innerHTML = `<option value="">Todos</option>` +
        sources.map(s=>`<option>${s}</option>`).join("");

    renderNews();
}

function renderNews(){
    const search = document.getElementById("search").value.toLowerCase();
    const source = document.getElementById("sourceFilter").value;

    let filtered = allNews.filter(n=>{
        return (!source || n.source===source) &&
               (!search || n.title.toLowerCase().includes(search));
    });

    document.getElementById("news").innerHTML =
    filtered.map(n=>`
        <div class="card">
            <div class="title">${n.title}</div>
            <div class="small">${n.source || ""} - ${n.time}</div>
            <a href="${n.link}" target="_blank">Leer</a>
        </div>
    `).join("");
}

async function loadTable(){
    const res = await fetch("https://v3.football.api-sports.io/standings?league=128&season=2024", {
        headers:{
            "x-apisports-key":"YOUR_KEY"
        }
    });

    const data = await res.json();
    const t = data.response[0].league.standings[0];

    document.getElementById("standings").innerHTML =
    `<table border="1" cellpadding="5">
    ${t.map(r=>`
        <tr ${r.team.name.includes("Gimnasia")?"style='background:yellow'":""}>
            <td>${r.rank}</td>
            <td>${r.team.name}</td>
            <td>${r.points}</td>
        </tr>
    `).join("")}
    </table>`;
}

// init
if(localStorage.getItem("dark")==="true") toggleDark();

loadNews();
setInterval(loadNews, 60000);
</script>

</body>
</html>
