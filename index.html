<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GELP Hub - El Lobo al Día</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #f4f6f9; --card: #ffffff; --text: #1a1a1a; --accent: #002d5a; --border: #d1d5db; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --border: #334155; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }

        header { background: #002d5a; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .logo { font-weight: 900; letter-spacing: 1px; }
        .controls button { background: rgba(255,255,255,0.15); color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; width: 40px; height: 40px; margin-left: 10px; }

        .container { display: grid; grid-template-columns: 260px 1fr; max-width: 1400px; margin: 2rem auto; gap: 2rem; padding: 0 1rem; }
        
        .sidebar { background: var(--card); border-radius: 15px; border: 1px solid var(--border); height: fit-content; overflow: hidden; position: sticky; top: 100px; }
        .menu-item { padding: 1.2rem; cursor: pointer; font-weight: 700; border-bottom: 1px solid var(--border); transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover, .menu-item.active { background: var(--accent); color: white; }

        .tabs { display: flex; gap: 10px; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 10px; }
        .tab { background: var(--card); border: 1px solid var(--border); padding: 10px 20px; border-radius: 30px; cursor: pointer; white-space: nowrap; font-size: 0.9rem; font-weight: 600; }
        .tab.active { background: var(--accent); color: white; border: none; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; gap: 12px; border-top: 5px solid var(--accent); }
        .card-source { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .card-title { font-size: 1.1rem; font-weight: 700; line-height: 1.4; }
        .card-desc { font-size: 0.9rem; opacity: 0.8; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .card-link { margin-top: auto; background: var(--accent); color: white; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; }

        .table-container { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        select { width: 100%; padding: 12px; background: var(--card); color: var(--text); border: none; border-bottom: 1px solid var(--border); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.05); padding: 15px; text-align: left; font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr.gelp-row { background: rgba(0, 45, 90, 0.1) !important; font-weight: 900; }

        .loader { text-align: center; padding: 3rem; grid-column: 1/-1; }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .sidebar { position: static; } }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="logo">GELP HUB DIGITAL</div>
        <div class="controls">
            <button onclick="toggleTheme()" title="Modo Oscuro"><i class="fa-solid fa-circle-half-stroke"></i></button>
            <button onclick="refreshData()" title="Actualizar Todo"><i class="fa-solid fa-sync"></i></button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="menu-item active" onclick="switchSection('news', this)"><i class="fa-solid fa-rss"></i> Noticias</div>
            <div class="menu-item" onclick="switchSection('stats', this)"><i class="fa-solid fa-ranking-star"></i> Posiciones</div>
        </aside>

        <main>
            <section id="sec-news">
                <div class="tabs">
                    <div class="tab active" onclick="filterCat('Todo', this)">Todo</div>
                    <div class="tab" onclick="filterCat('Fútbol', this)">Fútbol</div>
                    <div class="tab" onclick="filterCat('Básquet', this)">Básquet</div>
                    <div class="tab" onclick="filterCat('Vóley', this)">Vóley</div>
                </div>
                <div class="news-grid" id="newsGrid">
                    <div class="loader">Conectando con los portales de noticias...</div>
                </div>
            </section>

            <section id="sec-stats" style="display:none">
                <div class="table-container">
                    <select id="leagueSelector" onchange="fetchTable()">
                        <option value="128">Liga Profesional Argentina</option>
                        <option value="130">Copa de la Liga (AFA)</option>
                        <option value="13">Copa Libertadores</option>
                        <option value="11">Copa Sudamericana</option>
                    </select>
                    <div id="tableContent">
                        <table>
                            <thead><tr><th>#</th><th>Equipo</th><th>Pts</th><th>PJ</th><th>DG</th></tr></thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_NEWS = '034d49f86772190e8bd3efe1c0a5e29e';
        const API_SPORTS = 'd07a089a76b2c5a4c9f66f80337665ea';
        const GELP_ID = 455;

        let allNews = [];
        let currentCat = 'Todo';

        // --- MANEJO DE TEMA (DARK MODE) ---
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('gelp_theme', newTheme);
        }

        // --- NAVEGACIÓN ---
        function switchSection(id, el) {
            document.getElementById('sec-news').style.display = id === 'news' ? 'block' : 'none';
            document.getElementById('sec-stats').style.display = id === 'stats' ? 'block' : 'none';
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
            if(id === 'stats') fetchTable();
        }

        function filterCat(cat, el) {
            currentCat = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderNews();
        }

        // --- CARGAR NOTICIAS ---
        async function fetchNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-spin"></i> Buscando novedades en El Día, Olé y TyC...</div>';
            
            // Intentamos traer noticias de Gimnasia de los últimos 7 días para asegurar contenido
            const url = `https://gnews.io/api/v4/search?q="Gimnasia La Plata"&lang=es&country=ar&max=25&apikey=${API_NEWS}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if(data.articles && data.articles.length > 0) {
                    allNews = data.articles;
                } else {
                    // Si falla la búsqueda específica, buscamos algo más general del Lobo
                    const fallback = await fetch(`https://gnews.io/api/v4/search?q="GELP"&lang=es&apikey=${API_NEWS}`);
                    const fallbackData = await fallback.json();
                    allNews = fallbackData.articles || [];
                }
                renderNews();
            } catch (e) {
                grid.innerHTML = '<div class="loader">No se pudieron cargar noticias. Verifica el límite de tu API Key o la conexión.</div>';
            }
        }

        function renderNews() {
            const grid = document.getElementById('newsGrid');
            const keywords = {
                'Fútbol': ['futbol', 'gol', 'mendez', 'estancia', 'afa', 'lpf', 'copa'],
                'Básquet': ['basquet', 'básquet', 'nacional', 'triple', 'tablero'],
                'Vóley': ['vóley', 'voley', 'lobas', 'set', 'remate']
            };

            const filtered = allNews.filter(n => {
                const content = (n.title + n.description).toLowerCase();
                if(currentCat === 'Todo') return true;
                return keywords[currentCat].some(k => content.includes(k));
            });

            if(filtered.length === 0) {
                grid.innerHTML = `<div class="loader">No hay noticias de ${currentCat} en este momento.</div>`;
                return;
            }

            grid.innerHTML = filtered.map(n => `
                <div class="card">
                    <div class="card-source">${n.source.name}</div>
                    <div class="card-title">${n.title}</div>
                    <div class="card-desc">${n.description || ''}</div>
                    <a href="${n.url}" target="_blank" rel="noopener" class="card-link">Leer noticia</a>
                </div>
            `).join('');
        }

        // --- CARGAR POSICIONES ---
        async function fetchTable() {
            const body = document.getElementById('tableBody');
            const league = document.getElementById('leagueSelector').value;
            body.innerHTML = '<tr><td colspan="5" style="text-align:center">Actualizando tabla...</td></tr>';

            try {
                const res = await fetch(`https://v3.football.api-sports.io/standings?league=${league}&season=2024`, {
                    headers: { 'x-apisports-key': API_SPORTS }
                });
                const data = await res.json();
                const list = data.response[0].league.standings[0];

                body.innerHTML = list.map(t => `
                    <tr class="${t.team.id === GELP_ID ? 'gelp-row' : ''}">
                        <td>${t.rank}</td>
                        <td>${t.team.name}</td>
                        <td>${t.points}</td>
                        <td>${t.all.played}</td>
                        <td>${t.goalsDiff}</td>
                    </tr>
                `).join('');
            } catch (e) {
                body.innerHTML = '<tr><td colspan="5" style="text-align:center">Datos no disponibles para este torneo.</td></tr>';
            }
        }

        function refreshData() {
            fetchNews();
            if(document.getElementById('sec-stats').style.display === 'block') fetchTable();
        }

        // Inicialización
        window.onload = () => {
            const savedTheme = localStorage.getItem('gelp_theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            fetchNews();
        };
    </script>
</body>
</html>
