<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gimnasia News</title>

<style>
:root {
  --bg: #ffffff;
  --text: #111;
  --card: #f3f3f3;
  --accent: #1f6feb;
}

body.dark {
  --bg: #0f0f0f;
  --text: #f5f5f5;
  --card: #1c1c1c;
  --accent: #4ea1ff;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

header {
  padding: 15px;
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
}

h1 {
  font-size: 20px;
  margin: 0;
}

input {
  padding: 8px;
  width: 200px;
}

button {
  padding: 8px 10px;
  cursor: pointer;
}

.container {
  padding: 15px;
}

.card {
  background: var(--card);
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.title {
  font-weight: bold;
  margin-bottom: 5px;
}

.summary {
  font-size: 13px;
  opacity: 0.85;
  margin-bottom: 6px;
}

.portal {
  font-size: 12px;
  color: var(--accent);
}
</style>
</head>

<body>
<header>
  <h1>Gimnasia News</h1>

  <input id="search" placeholder="Search news..." />

  <button onclick="toggleMode()">🌓</button>
</header>

<div class="container" id="news"></div>

<script>
const API = "https://gimnasia-news-zwn3.vercel.app/api/news";

let allNews = [];

function getDomain(url) {
  try {
    return new URL(url).hostname.replace("www.", "");
  } catch {
    return "Unknown";
  }
}

function makeSummary(title) {
  return title.length > 120 ? title.substring(0, 120) + "..." : title;
}

function render(data) {
  const container = document.getElementById("news");
  container.innerHTML = "";

  data.forEach(item => {
    const portal = getDomain(item.link);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${item.title}</div>
      <div class="summary">${makeSummary(item.title)}</div>
      <div class="portal">${portal}</div>
    `;

    container.appendChild(card);
  });
}

async function loadNews() {
  const res = await fetch(API);
  const data = await res.json();

  // remove Google News noise
  allNews = data.filter(n => n.link);

  render(allNews);
}

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = allNews.filter(n =>
    n.title.toLowerCase().includes(val)
  );

  render(filtered);
});

function toggleMode() {
  document.body.classList.toggle("dark");
  localStorage.setItem("mode", document.body.classList.contains("dark") ? "dark" : "light");
}

(function initMode() {
  const mode = localStorage.getItem("mode");
  if (mode === "dark") document.body.classList.add("dark");
})();

loadNews();
</script>

</body>
</html>
