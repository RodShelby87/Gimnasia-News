<script>
let allNews = [];
let currentSport = "all";
let currentTab = "news";

// DOM elements (adjust IDs if needed)
const newsContainer = document.getElementById("news");
const sportTabs = document.getElementById("sportTabs");
const standingsContainer = document.getElementById("standings");
const tournamentSelect = document.getElementById("tournament");

// 1. LOAD NEWS
async function loadNews() {
  const res = await fetch("/api/news");
  allNews = await res.json();

  renderSports();
  renderNews();
}

// 2. RENDER SPORT TABS (FIXES “ONLY ALL” PROBLEM)
function renderSports() {
  const sports = ["all", ...new Set(allNews.map(n => n.sport))];

  sportTabs.innerHTML = "";

  sports.forEach(s => {
    const btn = document.createElement("button");
    btn.innerText = s;

    btn.onclick = () => {
      currentSport = s;
      renderNews();
    };

    sportTabs.appendChild(btn);
  });
}

// 3. FILTER NEWS
function renderNews() {
  const filtered =
    currentSport === "all"
      ? allNews
      : allNews.filter(n => n.sport === currentSport);

  newsContainer.innerHTML = filtered.map(n => `
    <div>
      <a href="${n.link}" target="_blank">${n.title}</a>
      <p>${n.dateOnly}</p>
    </div>
  `).join("");
}

// 4. LOAD STANDINGS (ONLY WHEN TAB IS OPEN)
async function loadStandings() {
  const sport = currentSport;
  const tournament = tournamentSelect?.value || "all";

  const res = await fetch(`/api/standings?sport=${sport}&tournament=${tournament}`);
  const data = await res.json();

  standingsContainer.innerHTML = data.map(t => `
    <div>
      <strong>${t.name}</strong> - ${t.points} pts
    </div>
  `).join("");
}

// 5. TAB SWITCH
function showTab(tab) {
  currentTab = tab;

  document.getElementById("newsTab").style.display = tab === "news" ? "block" : "none";
  document.getElementById("standingsTab").style.display = tab === "standings" ? "block" : "none";

  if (tab === "standings") {
    loadStandings();
  }
}

// INIT
loadNews();
</script>
