<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub GELP - Gimnasia y Esgrima La Plata</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Modo Claro (Default) */
            --bg-body: #f4f6f9;
            --bg-nav: #001f3f; /* Azul Marino GELP */
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #dddddd;
            --accent-color: #001f3f;
            --btn-text: #ffffff;
            --live-bg: #e74c3c;
        }

        [data-theme="dark"] {
            /* Modo Oscuro */
            --bg-body: #121212;
            --bg-nav: #0d1117;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --accent-color: #4a90e2;
            --btn-text: #ffffff;
            --live-bg: #c0392b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-body); color: var(--text-main); transition: all 0.3s ease; }

        /* Header */
        header { background-color: var(--bg-nav); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .logo-area { display: flex; align-items: center; gap: 15px; font-size: 24px; font-weight: bold; }
        .header-controls { display: flex; gap: 15px; }
        button { background-color: transparent; border: 1px solid white; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: rgba(255,255,255,0.2); }
        .btn-refresh { background-color: #27ae60; border: none; }
        .btn-refresh:hover { background-color: #2ecc71; }

        /* Layout */
        .container { display: flex; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 15px; min-height: 80vh; }
        
        /* Sidebar (Index) */
        .sidebar { width: 250px; background-color: var(--bg-card); border-radius: 8px; padding: 20px; border: 1px solid var(--border-color); height: fit-content; }
        .sidebar ul { list-style: none; }
        .sidebar li { padding: 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; font-weight: bold; transition: 0.2s; }
        .sidebar li:hover, .sidebar li.active { color: var(--accent-color); padding-left: 20px; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .section { display: none; }
        .section.active { display: block; }

        /* Tools Bar (Search & Filters) */
        .tools-bar { display: flex; gap: 15px; background-color: var(--bg-card); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); flex-wrap: wrap; }
        input, select { padding: 10px; border-radius: 5px; border: 1px solid var(--border-color); background-color: var(--bg-body); color: var(--text-main); flex: 1; min-width: 200px; }

        /* Tabs (Sports) */
        .sports-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .sport-tab { padding: 10px 20px; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .sport-tab.active { background-color: var(--accent-color); color: var(--btn-text); border: none; }

        /* Live Match Banner */
        .live-banner { background-color: var(--live-bg); color: white; padding: 15px; border-radius: 8px; display: none; align-items: center; justify-content: space-between; }
        .live-banner.active { display: flex; }
        .live-details { font-size: 14px; margin-top: 5px; }

        /* News Feed */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .news-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; gap: 10px; transition: transform 0.2s; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .news-portal { font-size: 12px; color: var(--accent-color); font-weight: bold; text-transform: uppercase; }
        .news-time { font-size: 12px; color: var(--text-muted); float: right; }
        .news-title { font-size: 18px; font-weight: bold; line-height: 1.3; }
        .news-summary { font-size: 14px; color: var(--text-muted); flex-grow: 1; }
        .news-link { text-decoration: none; color: white; background-color: var(--accent-color); padding: 8px; text-align: center; border-radius: 5px; margin-top: 10px; }

        /* Standings Table */
        table { width: 100%; border-collapse: collapse; background-color: var(--bg-card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: var(--bg-nav); color: white; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="logo-area">
            <i class="fa-solid fa-wolf-pack-battles"></i>
            <span>Hub GELP</span>
        </div>
        <div class="header-controls">
            <button onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
            <button class="btn-refresh" onclick="refreshData()"><i class="fa-solid fa-rotate-right"></i> Actualizar</button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <ul>
                <li class="active" onclick="switchMainSection('noticias', this)">Noticias</li>
                <li onclick="switchMainSection('posiciones', this)">Posiciones</li>
            </ul>
        </aside>

        <main class="main-content">
            
            <div id="noticias" class="section active">
                <div class="sports-tabs" id="sportsTabs">
                    <div class="sport-tab active" onclick="selectSport('futbol_masculino', this)">Fútbol Masc.</div>
                    <div class="sport-tab" onclick="selectSport('futbol_femenino', this)">Fútbol Fem.</div>
                    <div class="sport-tab" onclick="selectSport('basquet', this)">Básquet</div>
                    <div class="sport-tab" onclick="selectSport('voley', this)">Vóley</div>
                </div>

                <div class="live-banner" id="liveMatchBanner">
                    <div>
                        <h3 id="liveTeams">Gimnasia vs. Rival</h3>
                        <div class="live-details" id="liveDetails">⏱ 65' | Goles: Tarragona (G), Ramirez (R) | Tarjetas: 🟨 2</div>
                    </div>
                    <h2 id="liveScore">1 - 1</h2>
                </div>

                <div class="tools-bar">
                    <input type="text" id="searchBar" placeholder="Buscar noticia..." oninput="filterNews()">
                    <select id="portalFilter" onchange="filterNews()">
                        <option value="all">Todos los portales</option>
                        </select>
                </div>

                <div class="news-grid" id="newsContainer">
                    <p>Cargando noticias de hoy...</p>
                </div>
            </div>

            <div id="posiciones" class="section">
                <div class="tools-bar">
                    <select id="posSportSelect">
                        <option value="futbol">Fútbol</option>
                        <option value="basquet">Básquet</option>
                        <option value="voley">Vóley</option>
                    </select>
                    <select id="posTournamentSelect">
                        <option value="lpf">Liga Profesional</option>
                        <option value="copa">Copa de la Liga</option>
                    </select>
                </div>
                <div style="overflow-x: auto; margin-top: 20px;">
                    <table id="standingsTable">
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th>Equipo</th>
                                <th>Pts</th>
                                <th>PJ</th>
                                <th>G</th>
                                <th>E</th>
                                <th>P</th>
                            </tr>
                        </thead>
                        <tbody id="standingsBody">
                            </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN DE APIs (Coloca tus keys aquí)
        // ==========================================
        const GNEWS_API_KEY = 'TU_GNEWS_API_KEY_AQUI'; 
        const FOOTBALL_API_KEY = 'TU_FOOTBALL_API_KEY_AQUI';
        const GELP_TEAM_ID = '1010'; // ID aproximado de Gimnasia en API-Football (debes verificarlo en su doc)

        // Variables de estado
        let allNews = [];
        let currentSport = 'futbol_masculino';

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        window.onload = () => {
            refreshData();
        };

        function refreshData() {
            fetchNews();
            fetchLiveScore();
            fetchStandings();
        }

        // ==========================================
        // UI & NAVEGACIÓN
        // ==========================================
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                btn.innerHTML = '<i class="fa-solid fa-sun"></i>';
            } else {
                body.setAttribute('data-theme', 'light');
                btn.innerHTML = '<i class="fa-solid fa-moon"></i>';
            }
        }

        function switchMainSection(sectionId, element) {
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            
            document.querySelectorAll('.sidebar li').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        function selectSport(sport, element) {
            currentSport = sport;
            document.querySelectorAll('.sport-tab').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            // Aquí se podría llamar a noticias específicas del deporte si la API lo permite
            // Por ahora, recargamos el layout del banner en vivo
            fetchLiveScore(); 
        }

        // ==========================================
        // LÓGICA DE NOTICIAS
        // ==========================================
        async function fetchNews() {
            const container = document.getElementById('newsContainer');
            // Búsqueda específica asegurando los portales locales obligatorios
            const query = encodeURIComponent('"Gimnasia y Esgrima La Plata" OR "Gimnasia LP"');
            const url = `https://gnews.io/api/v4/search?q=${query}&lang=es&sortby=publishedAt&apikey=${GNEWS_API_KEY}`;

            try {
                if(GNEWS_API_KEY === 'TU_GNEWS_API_KEY_AQUI') throw new Error("Falta API Key");
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.articles) {
                    processAndRenderNews(data.articles);
                } else {
                    container.innerHTML = '<p>No se encontraron noticias o se alcanzó el límite de la API.</p>';
                }
            } catch (error) {
                console.warn("Usando datos de prueba porque no hay API Key válida.", error);
                // DATOS DE PRUEBA (Fallback) para que veas cómo funciona visualmente
                const mockDate = new Date().toISOString();
                const mockNews = [
                    { title: "El Lobo se prepara para el clásico", description: "El plantel entrenó en Estancia Chica con la mira puesta en el domingo...", source: { name: "Cielosports" }, url: "#", publishedAt: mockDate },
                    { title: "Declaraciones del DT tripero", description: "El técnico analizó el último partido y destacó la actitud del equipo.", source: { name: "El Día" }, url: "#", publishedAt: mockDate },
                    { title: "Nuevo refuerzo en Básquet", description: "Gimnasia suma centímetros en la pintura para la Liga Nacional.", source: { name: "0221" }, url: "#", publishedAt: mockDate },
                    { title: "Las Lobas ganaron en casa", description: "Victoria contundente del equipo de Vóley femenino.", source: { name: "Olé" }, url: "#", publishedAt: mockDate }
                ];
                processAndRenderNews(mockNews);
            }
        }

        function isTodayLocal(utcDateString) {
            const newsDate = new Date(utcDateString); // Convierte UTC a la hora local del navegador
            const today = new Date();
            return newsDate.getDate() === today.getDate() &&
                   newsDate.getMonth() === today.getMonth() &&
                   newsDate.getFullYear() === today.getFullYear();
        }

        function processAndRenderNews(articles) {
            // 1. Filtrar ESTRICTAMENTE solo noticias de HOY
            allNews = articles.filter(article => isTodayLocal(article.publishedAt));

            // 2. Ordenar de más nueva a más vieja (por si la API falla en el sort)
            allNews.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

            // 3. Llenar el Dropdown de Portales
            populatePortalsDropdown(allNews);

            // 4. Renderizar
            renderNews(allNews);
        }

        function populatePortalsDropdown(newsArray) {
            const select = document.getElementById('portalFilter');
            const portals = new Set(newsArray.map(n => n.source.name));
            
            select.innerHTML = '<option value="all">Todos los portales</option>';
            portals.forEach(portal => {
                select.innerHTML += `<option value="${portal}">${portal}</option>`;
            });
        }

        function renderNews(newsArray) {
            const container = document.getElementById('newsContainer');
            container.innerHTML = '';

            if (newsArray.length === 0) {
                container.innerHTML = '<p>No hay noticias publicadas el día de hoy todavía.</p>';
                return;
            }

            newsArray.forEach(news => {
                const dateObj = new Date(news.publishedAt);
                const timeString = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div>
                        <span class="news-portal">${news.source.name}</span>
                        <span class="news-time">${timeString}</span>
                    </div>
                    <div class="news-title">${news.title}</div>
                    <div class="news-summary">${news.description.substring(0, 120)}...</div>
                    <a href="${news.url}" target="_blank" class="news-link">Leer en portal original</a>
                `;
                container.appendChild(card);
            });
        }

        function filterNews() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const portalFilter = document.getElementById('portalFilter').value;

            const filtered = allNews.filter(news => {
                const matchesSearch = news.title.toLowerCase().includes(searchTerm) || news.description.toLowerCase().includes(searchTerm);
                const matchesPortal = portalFilter === 'all' || news.source.name === portalFilter;
                return matchesSearch && matchesPortal;
            });

            renderNews(filtered);
        }

        // ==========================================
        // LÓGICA DE RESULTADOS EN VIVO (API-Football)
        // ==========================================
        async function fetchLiveScore() {
            const banner = document.getElementById('liveMatchBanner');
            
            if (currentSport !== 'futbol_masculino') {
                banner.classList.remove('active');
                return; // APIs gratuitas limitadas para otros deportes
            }

            try {
                if(FOOTBALL_API_KEY === 'TU_FOOTBALL_API_KEY_AQUI') throw new Error("Falta API Key");

                const response = await fetch(`https://v3.football.api-sports.io/fixtures?team=${GELP_TEAM_ID}&live=all`, {
                    headers: { 'x-apisports-key': FOOTBALL_API_KEY }
                });
                const data = await response.json();

                if (data.response && data.response.length > 0) {
                    const match = data.response[0];
                    document.getElementById('liveTeams').innerText = `${match.teams.home.name} vs ${match.teams.away.name}`;
                    document.getElementById('liveScore').innerText = `${match.goals.home} - ${match.goals.away}`;
                    document.getElementById('liveDetails').innerText = `⏱ ${match.fixture.status.elapsed}' | Torneo: ${match.league.name}`;
                    banner.classList.add('active');
                } else {
                    banner.classList.remove('active');
                }
            } catch (error) {
                // Mock visual de partido en vivo si no hay API Key
                console.log("Sin partido en vivo real, ocultando banner.");
                banner.classList.remove('active');
            }
        }

        // ==========================================
        // LÓGICA DE POSICIONES
        // ==========================================
        async function fetchStandings() {
            // Aquí iría la llamada a la API-Football endpoint: /standings
            // Para mostrar la funcionalidad, generaremos la tabla base de Gimnasia.
            const tbody = document.getElementById('standingsBody');
            
            // Mock de posiciones
            const mockStandings = [
                { pos: 1, team: "River Plate", pts: 21, pj: 10, g: 6, e: 3, p: 1 },
                { pos: 2, team: "Gimnasia LP", pts: 19, pj: 10, g: 5, e: 4, p: 1 },
                { pos: 3, team: "Estudiantes LP", pts: 18, pj: 10, g: 5, e: 3, p: 2 },
            ];

            tbody.innerHTML = '';
            mockStandings.forEach(row => {
                const tr = document.createElement('tr');
                if (row.team === "Gimnasia LP") tr.style.fontWeight = "bold";
                tr.innerHTML = `
                    <td>${row.pos}</td>
                    <td>${row.team}</td>
                    <td>${row.pts}</td>
                    <td>${row.pj}</td>
                    <td>${row.g}</td>
                    <td>${row.e}</td>
                    <td>${row.p}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
